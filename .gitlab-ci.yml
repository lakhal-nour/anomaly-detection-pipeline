# .gitlab-ci.yml
stages:
  - test
  - security
  - build
  - scan
  - deploy

variables:
  IMAGE_NAME: "siem-anomaly-detection"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"

# ─── STAGE 1 : TESTS ──────────────────────────────────────────
unit-tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r requirements.txt
  script:
    - echo "Lancement des tests unitaires..."
    - python -m pytest tests/ -v
  allow_failure: false

# ─── STAGE 2 : SÉCURITÉ ───────────────────────────────────────
bandit-sast:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install bandit
  script:
    - echo "Scan SAST avec Bandit..."
    - bandit -r src/ -f txt
    - bandit -r src/ --severity-level medium --exit-zero
  allow_failure: true

safety-sca:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install safety
  script:
    - echo "Scan SCA avec Safety..."
    - safety check -r requirements.txt --output text || true
  allow_failure: true

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - echo "Scan secrets avec GitLeaks..."
    - gitleaks detect --source . --verbose --exit-code 0
  allow_failure: true

# ─── STAGE 3 : BUILD DOCKER ───────────────────────────────────
build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Build de l image Docker..."
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker build -t $IMAGE_NAME:latest .
    - echo "Image construite avec succes"
  allow_failure: false

# ─── STAGE 4 : SCAN IMAGE ─────────────────────────────────────
trivy-scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - echo "Scan image Docker avec Trivy..."
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --format table $IMAGE_NAME:latest
  allow_failure: true
  needs: ["build-docker"]

# ─── STAGE 5 : DEPLOY ─────────────────────────────────────────
deploy-staging:
  stage: deploy
  image: python:3.12-slim
  script:
    - echo "Image $IMAGE_NAME:$IMAGE_TAG prete pour deploiement"
    - echo "Pipeline DevSecOps complete avec succes"
  environment:
    name: staging
  only:
    - main
  needs: ["trivy-scan"]
